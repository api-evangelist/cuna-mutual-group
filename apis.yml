aid: cuna-mutual-group
name: CUNA Mutual Group (TruStage)
description: >-
  CUNA Mutual Group, now operating as TruStage, is an insurance and financial services
  company that provides insurance, retirement, and investment products to credit unions
  and their members. Founded in 1935 to serve the credit union movement, the company
  rebranded to TruStage in 2023, unifying its consumer-facing brands under a single
  identity. TruStage offers life insurance, auto and home insurance, AD&D, retirement
  planning, annuities, lending solutions, compliance services, and analytics tools
  to credit unions and their members.
